<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="iPhone">
  <rect width="600" height="400" fill="#f6f5f2"/>
  <g transform="translate(300 200)">
    <!-- phone body -->
    <rect x="-78" y="-150" width="156" height="300" rx="34" fill="#1b1b1f"/>
    <rect x="-70" y="-142" width="140" height="284" rx="28" fill="#2c2c34"/>
    <!-- screen -->
    <rect x="-62" y="-134" width="124" height="268" rx="22" fill="#0e0e12"/>
    <!-- dynamic island -->
